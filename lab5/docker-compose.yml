services:
  db:
    image: postgres:16-alpine
    container_name: lab5-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: caruser
      POSTGRES_PASSWORD: carpass
      POSTGRES_DB: cardb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - db-internal

  minio:
    image: minio/minio:latest
    container_name: lab5-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - storage-net
      - default

  crud-service:
    build: ./crud_service
    container_name: lab5-crud
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://caruser:carpass@db:5432/cardb
      REPORT_SERVICE_URL: http://report-service:8001
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: reports
    ports:
      - "8000:8000"
    depends_on:
      - db
      - minio
      - report-service
    networks:
      - db-internal
      - storage-net
      - services-internal
      - default

  report-service:
    build: ./report_service
    container_name: lab5-report
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://caruser:carpass@db:5432/cardb
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: reports
    depends_on:
      - db
      - minio
    networks:
      - db-internal
      - storage-net
      - services-internal

networks:
  db-internal:
    internal: true
  services-internal:
    internal: true
  storage-net:

volumes:
  pgdata:
  minio-data:
